purpose: "Display content in an elevated card for dashboards, stat cards, content previews, and visually distinct content grouping with interactive behavior."

usage:
  when_to_use:
    - "Card with elevation"
    - "Interactive card"
  when_not_to_use:
    - "Generic content wrapper — use Container-Base"
    - "Custom container needs — use Container-Base"
    - "Creating interactive buttons (use Buttons instead)"
    - "Building form inputs (use Form Inputs instead)"
    - "Creating modals (use Modals when available)"

contexts:
  - "dashboards"
  - "content-feeds"
  - "product-cards"
  - "profile-sections"
  - "settings-screens"

alternatives:
  - component: Container-Base
    reason: "When generic content wrapper"
