purpose: "Display a notification-specific count badge with semantic color and live region announcements for screen readers."

usage:
  when_to_use:
    - "Notification count"
  when_not_to_use:
    - "Category label — use Badge-Label-Base"
    - "Status indicator — use Badge-Label-Base"
    - "Unread count — use Badge-Count-Base"
    - "Custom-colored count — use Badge-Count-Base"
    - "User interaction is needed (use Tag or Chip components instead)"
    - "Content is dismissible (use Tag with dismiss action)"
    - "Selection is required (use Chip or Toggle)"
    - "The indicator needs to be focusable for accessibility"

contexts:
  - "icon-overlays"
  - "app-bars"
  - "navigation-tabs"

alternatives:
  - component: Badge-Label-Base
    reason: "When category label"
  - component: Badge-Count-Base
    reason: "When unread count"
