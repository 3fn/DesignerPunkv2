purpose: "Display a text label badge for categorization, status, or tagging content with short descriptive words."

usage:
  when_to_use:
    - "Category label"
    - "Status indicator"
  when_not_to_use:
    - "Unread count — use Badge-Count-Base"
    - "Notification count — use Badge-Count-Notification"
    - "Custom-colored count — use Badge-Count-Base"
    - "User interaction is needed (use Tag or Chip components instead)"
    - "Content is dismissible (use Tag with dismiss action)"
    - "Selection is required (use Chip or Toggle)"
    - "The indicator needs to be focusable for accessibility"

contexts:
  - "product-cards"
  - "list-items"
  - "dashboards"

alternatives:
  - component: Badge-Count-Base
    reason: "When unread count"
  - component: Badge-Count-Notification
    reason: "When notification count"
