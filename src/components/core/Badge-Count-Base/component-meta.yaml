purpose: "Display a numeric count indicator for unread notifications, item quantities, or stat card metrics in a compact badge."

usage:
  when_to_use:
    - "Unread count"
    - "Custom-colored count"
  when_not_to_use:
    - "Category label — use Badge-Label-Base"
    - "Status indicator — use Badge-Label-Base"
    - "Notification count — use Badge-Count-Notification"
    - "User interaction is needed (use Tag or Chip components instead)"
    - "Content is dismissible (use Tag with dismiss action)"
    - "Selection is required (use Chip or Toggle)"
    - "The indicator needs to be focusable for accessibility"

contexts:
  - "navigation-tabs"
  - "list-items"
  - "icon-overlays"
  - "app-bars"
  - "dashboards"

alternatives:
  - component: Badge-Label-Base
    reason: "When category label"
  - component: Badge-Count-Notification
    reason: "When notification count"
