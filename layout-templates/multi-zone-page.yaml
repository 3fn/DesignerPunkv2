# Multi-Zone Page — three independently functional regions
# For pages requiring simultaneous access to multiple information streams.
# Example: navigation + content feed + contextual sidebar (community pages, dashboards).
# Grid margins are handled automatically by the grid system at each breakpoint.

name: multi-zone-page
source: system
description: Three independently functional regions for pages requiring simultaneous access to multiple information streams. All regions stack vertically at narrow viewports.
category: multi-region
tags: [multi-zone, three-region, complex-layout, dashboard]

regions:
  - name: navigation
    description: Persistent navigation or filtering — controls that influence the content zone
    grid:
      xs:
        columns: "1-4"
      sm:
        columns: "1-8"
      md:
        columns: "1-3"
      lg:
        columns: "1-3"
    stacking:
      below: breakpointMd
      order: 1

  - name: content-feed
    description: Primary content stream — the main information the user is consuming
    grid:
      xs:
        columns: "1-4"
      sm:
        columns: "1-8"
      md:
        columns: "4-9"
      lg:
        columns: "4-11"
    stacking:
      below: breakpointMd
      order: 2

  - name: context
    description: Contextual information — metadata, related content, community info
    grid:
      xs:
        columns: "1-4"
      sm:
        columns: "1-8"
      md:
        columns: "10-12"
      lg:
        columns: "12-16"
    stacking:
      below: breakpointMd
      order: 3
